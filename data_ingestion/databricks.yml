# This is a Databricks asset bundle definition for data_ingestion.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: data_ingestion
  uuid: 5503e953-0dbe-4262-8559-5e66234d8c22

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: databricks_cata
  schema:
    description: dlt_ingestion

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405607581217440.0.azuredatabricks.net
    variables:
      catalog: databricks_ete
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405607581217440.0.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/maheshkatore1@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/maheshkatore1@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: databricks_ete
      schema: prod
    permissions:
      - user_name: maheshkatore1@gmail.com
        level: CAN_MANAGE
